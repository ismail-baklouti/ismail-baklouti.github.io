<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Bzgn2rUXqaWJ82DEFu0AEfvRdKrBLrDbl5GQGD70Z0c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.title }}">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "{{ site.title }}",
            "url": "{{ site.url }}{{ site.baseurl }}",
            "image": "{{ '/assets/img/prof_pic.jpg' | absolute_url }}",
            "email": "mailto:{{ site.email }}",
            "sameAs": [
{% assign first = 0 %}
{% if site.social.linkedin %}{% if first == 1 %}, {% endif %}"{{ site.social.linkedin }}"{% assign first = 1 %}{% endif %}
{% if site.social.orcid %}{% if first == 1 %}, {% endif %}"{{ site.social.orcid }}"{% assign first = 1 %}{% endif %}
{% if site.social.google_scholar %}{% if first == 1 %}, {% endif %}"{{ site.social.google_scholar }}"{% assign first = 1 %}{% endif %}
{% if site.social.researchgate %}{% if first == 1 %}, {% endif %}"{{ site.social.researchgate }}"{% assign first = 1 %}{% endif %}
{% if site.social.twitter %}{% if first == 1 %}, {% endif %}"{{ site.social.twitter }}"{% assign first = 1 %}{% endif %}
            ]
        }
        </script>
</head>
<body>
    <div class="site-container">
        <aside class="sidebar">
            <div class="sidebar-sticky">
                <div class="profile-header">
                    <!-- Image will now auto-size to fill this space -->
                    <img src="{{ '/assets/img/prof_pic.jpg' | relative_url }}" class="profile-img">
                    <h1>{{ site.title }}</h1>
                    <p class="tagline">{{ site.description }}</p>
                </div>
                
                                <nav class="nav-links">
                                    {% if site.email %}     
                                        <!-- Use a JS trigger instead of mailto to hide email and allow file uploads -->
                                        <a href="javascript:void(0)" onclick="openContactModal()" title="Contact" aria-label="Contact"><i class="fas fa-envelope"></i> Email Me</a>
                                    {% else %}
                                        <span class="disabled-link" aria-hidden="true"><i class="fas fa-envelope"></i> Email Me</span>
                                    {% endif %}
                                    <a href="https://scholar.google.com/citations?user=Af0tawMAAAAJ" target="_blank"><i class="fas fa-graduation-cap"></i> Google Scholar</a>
                                    <a href="https://orcid.org/0000-0002-6847-9017" target="_blank"><i class="fab fa-orcid"></i> ORCID Profile</a>
                                </nav>

                <div class="sidebar-footer">
                    <p>© {{ "now" | date: "%Y" }} Ismail Baklouti</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            {{ content }}
        </main>
    </div>

<!-- Contact Modal -->
    <div id="contactModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
            <button class="close-btn" onclick="closeContactModal()" aria-label="Close contact form">&times;</button>
            <div class="modal-header" id="contactModalHeader" title="Drag to move"> 
                <h2 id="contactModalTitle">Contact Dr. Baklouti</h2>
            </div>
            
            <!-- IMPORTANT: Set `formspree_id` in _config.yml to your 8-character Formspree ID -->
            <form id="contactForm" action="https://formspree.io/f/{{ site.formspree_id }}" method="POST" enctype="multipart/form-data">                
                <!-- Honeypot to trap bots -->
                <div style="position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden;" aria-hidden="true">
                    <label>Leave this field empty</label>
                    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="contactEmail">Your Email Address:</label>
                    <input type="email" name="email" id="contactEmail" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="contactMessage">Message:</label>
                    <textarea name="message" id="contactMessage" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="contactAttachment">Attach File (Optional):</label>
                    <input type="file" name="attachment" id="contactAttachment" accept=".pdf,image/*">
                    <div class="file-actions">
                        <div class="file-info" id="contactFileInfo" aria-live="polite"></div>
                        <div class="file-preview" id="contactFilePreview" aria-hidden="true">
                            <img id="contactPreviewImg" alt="Preview" src="" style="display:none">
                            <button type="button" class="remove-file" id="contactRemoveFile" style="display:none">Remove</button>
                        </div>
                    </div>
                </div>

                <div id="contactFormMessage" class="form-message" role="status" aria-live="polite"></div>

                <button type="submit" class="send-btn" id="contactSendBtn">
                    <span class="btn-spinner" aria-hidden="true"></span>
                    <span class="btn-text">Send Message</span>
                </button>
            </form>
        </div>
    </div>

                <div class="form-group">
                    <label>Your Email Address:</label>
                    <input type="email" name="email" id="contactEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message:</label>
                    <textarea name="message" id="contactMessage" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Attach File (Optional):</label>
                    <input type="file" name="attachment" id="contactAttachment" accept=".pdf,image/*">
                    <div class="file-actions">
                        <div class="file-info" id="contactFileInfo" aria-live="polite"></div>
                        <div class="file-preview" id="contactFilePreview" aria-hidden="true">
                            <img id="contactPreviewImg" alt="Preview" src="" style="display:none">
                            <button type="button" class="remove-file" id="contactRemoveFile" style="display:none">Remove</button>
                        </div>
                    </div>
                </div>

                <div id="contactFormMessage" class="form-message" role="status" aria-live="polite"></div>

                <button type="submit" class="send-btn" id="contactSendBtn"><span class="btn-spinner" aria-hidden="true"></span><span class="btn-text">Send Message</span></button>
            </form>
        </div>
    </div>

    <script>
        (function(){
            var modal = document.getElementById('contactModal');
            var form = document.getElementById('contactForm');
            var btn = document.getElementById('contactSendBtn');
            var msg = document.getElementById('contactFormMessage');
            var fileInput = document.getElementById('contactAttachment');
            var fileInfo = document.getElementById('contactFileInfo');
            var previouslyFocused = null;

            var ALLOWED_TYPES = ['application/pdf', 'image/png', 'image/jpeg'];
            var MAX_SIZE = 5 * 1024 * 1024; // 5 MB

            // Open/close helpers with focus management
            window.openContactModal = function() {
                if (!modal) return;
                previouslyFocused = document.activeElement;
                modal.style.display = 'block';
                modal.setAttribute('aria-hidden', 'false');
                trapFocus(modal);
                var email = document.getElementById('contactEmail');
                if (email) email.focus();
            };

            window.closeContactModal = function() {
                if (!modal) return;
                modal.style.display = 'none';
                modal.setAttribute('aria-hidden', 'true');
                releaseFocusTrap();
                if (previouslyFocused && previouslyFocused.focus) previouslyFocused.focus();
            };

            // Close on outside click
            window.addEventListener('click', function(event){ if (event.target === modal) closeContactModal(); });

            // Close on ESC
            window.addEventListener('keydown', function(e){ if (e.key === 'Escape') { if (modal && modal.style.display === 'block') closeContactModal(); }});

            // Make modal draggable by its header (mouse + touch)
            (function(){
                var modalContent = document.querySelector('.modal-content');
                var dragHandle = document.getElementById('contactModalHeader');
                if (!modalContent || !dragHandle) return;

                var isDragging = false;
                var startX = 0, startY = 0;
                var origX = 0, origY = 0;

                function onPointerMove(e) {
                    if (!isDragging) return;
                    var clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] && e.touches[0].clientX);
                    var clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] && e.touches[0].clientY);
                    if (clientX == null || clientY == null) return;
                    var dx = clientX - startX;
                    var dy = clientY - startY;
                    modalContent.style.left = (origX + dx) + 'px';
                    modalContent.style.top = (origY + dy) + 'px';
                    modalContent.style.transform = 'none';
                }

                function onPointerUp() {
                    if (!isDragging) return;
                    isDragging = false;
                    document.removeEventListener('mousemove', onPointerMove);
                    document.removeEventListener('mouseup', onPointerUp);
                    document.removeEventListener('touchmove', onPointerMove);
                    document.removeEventListener('touchend', onPointerUp);
                    modalContent.classList.remove('dragging');
                }

                function onPointerDown(e) {
                    // only left mouse button or touch
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    isDragging = true;
                    var clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] && e.touches[0].clientX);
                    var clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] && e.touches[0].clientY);
                    startX = clientX;
                    startY = clientY;
                    // compute current left/top in px; if not set, center it
                    var rect = modalContent.getBoundingClientRect();
                    var doc = document.documentElement;
                    var left = modalContent.style.left ? parseFloat(modalContent.style.left) : rect.left + window.scrollX;
                    var top = modalContent.style.top ? parseFloat(modalContent.style.top) : rect.top + window.scrollY;
                    origX = left;
                    origY = top;
                    modalContent.classList.add('dragging');
                    document.addEventListener('mousemove', onPointerMove);
                    document.addEventListener('mouseup', onPointerUp);
                    document.addEventListener('touchmove', onPointerMove, {passive: false});
                    document.addEventListener('touchend', onPointerUp);
                    e.preventDefault();
                }

                dragHandle.addEventListener('mousedown', onPointerDown);
                dragHandle.addEventListener('touchstart', onPointerDown, {passive: true});
            })();

            // Focus trap
            var focusable = null;
            function trapFocus(container){
                focusable = Array.prototype.slice.call(container.querySelectorAll('a, button, textarea, input, [tabindex]:not([tabindex="-1"])')).filter(function(el){ return !el.hasAttribute('disabled'); });
                if (focusable.length === 0) return;
                container.addEventListener('keydown', handleTrap);
            }
            function releaseFocusTrap(){ if (!modal) return; modal.removeEventListener('keydown', handleTrap); focusable = null; }
            function handleTrap(e){ if (e.key !== 'Tab') return; var first = focusable[0], last = focusable[focusable.length -1]; if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } } else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } } }

            // File validation
            function validateFile(file){
                if (!file) return { ok: true };
                if (ALLOWED_TYPES.indexOf(file.type) === -1) {
                    return { ok: false, reason: 'Invalid file type. Allowed: PDF, PNG, JPG.' };
                }
                if (file.size > MAX_SIZE) {
                    return { ok: false, reason: 'File too large. Max size is 5 MB.' };
                }
                return { ok: true };
            }

            if (fileInput) {
                var previewImg = document.getElementById('contactPreviewImg');
                var previewWrap = document.getElementById('contactFilePreview');
                var removeBtn = document.getElementById('contactRemoveFile');

                fileInput.addEventListener('change', function(){
                    var f = fileInput.files[0];
                    var res = validateFile(f);
                    if (!res.ok) {
                        fileInfo.textContent = res.reason;
                        fileInfo.style.color = '#991b1b';
                        btn.disabled = true;
                        // clear preview
                        if (previewImg) { previewImg.src = ''; previewImg.style.display = 'none'; }
                        if (removeBtn) removeBtn.style.display = 'none';
                        if (previewWrap) previewWrap.setAttribute('aria-hidden', 'true');
                    } else if (f) {
                        fileInfo.textContent = f.name + ' (' + Math.round(f.size/1024) + ' KB)';
                        fileInfo.style.color = '#334155';
                        btn.disabled = false;
                        // image preview when applicable
                        if (f.type && f.type.indexOf('image') === 0 && previewImg) {
                            try {
                                var url = URL.createObjectURL(f);
                                previewImg.src = url;
                                previewImg.style.display = 'inline-block';
                                if (previewWrap) previewWrap.setAttribute('aria-hidden', 'false');
                                if (removeBtn) { removeBtn.style.display = 'inline-block'; removeBtn.onclick = function(){ fileInput.value = ''; fileInfo.textContent = ''; previewImg.src = ''; previewImg.style.display = 'none'; removeBtn.style.display = 'none'; fileInput.focus(); }; }
                            } catch (e) {
                                console.warn('Preview not available', e);
                            }
                        } else {
                            // not an image — hide preview
                            if (previewImg) { previewImg.src = ''; previewImg.style.display = 'none'; }
                            if (removeBtn) { removeBtn.style.display = 'inline-block'; removeBtn.onclick = function(){ fileInput.value = ''; fileInfo.textContent = ''; removeBtn.style.display = 'none'; fileInput.focus(); }; }
                            if (previewWrap) previewWrap.setAttribute('aria-hidden', 'true');
                        }
                    } else {
                        fileInfo.textContent = '';
                        btn.disabled = false;
                        if (previewImg) { previewImg.src = ''; previewImg.style.display = 'none'; }
                        if (removeBtn) removeBtn.style.display = 'none';
                        if (previewWrap) previewWrap.setAttribute('aria-hidden', 'true');
                    }
                });
            }

            // AJAX submit
            if (form) {
                form.addEventListener('submit', function(e){
                    e.preventDefault();
                    // Honeypot
                    if (form.querySelector('input[name="_gotcha"]').value) return;

                    // Validate file again
                    var f = fileInput ? fileInput.files[0] : null;
                    var res = validateFile(f);
                    if (!res.ok) { msg.className = 'form-message error'; msg.textContent = res.reason; return; }

                    // UI
                    btn.disabled = true;
                    form.querySelector('.btn-spinner').classList.add('spinning');
                    form.querySelector('.btn-text').textContent = 'Sending…';
                    msg.textContent = '';

                    var action = form.getAttribute('action');
                    var data = new FormData(form);

                    fetch(action, { method: 'POST', body: data }).then(function(response){
                        if (response.ok) {
                            msg.className = 'form-message success';
                            msg.textContent = 'Thanks — your message was sent.';
                            form.reset();
                            fileInfo.textContent = '';
                            setTimeout(function(){ closeContactModal(); msg.textContent = ''; msg.className = 'form-message'; }, 2200);
                        } else {
                            return response.text().then(function(text){
                                var detail = text || response.statusText || 'Submission failed';
                                msg.className = 'form-message error';
                                msg.textContent = 'Error ' + response.status + ': ' + detail;
                                console.error('Contact form response error:', response.status, detail);
                                throw new Error(detail);
                            });
                        }
                    }).catch(function(err){
                        // If the server returned a message it will already be shown; otherwise show the error message
                        if (!msg.textContent) {
                            msg.className = 'form-message error';
                            msg.textContent = err && err.message ? err.message : 'Network error — submission failed.';
                        }
                        console.error('Contact form error:', err);

                        // Fallback: try a standard (non-AJAX) form submit using a hidden iframe so file inputs are preserved
                        if (!form.__fallbackAttempted) {
                            form.__fallbackAttempted = true;
                            msg.textContent += ' Falling back to standard form submit...';
                            try {
                                var iframeName = 'contactFallbackFrame';
                                var fallbackIframe = document.getElementById(iframeName);
                                if (!fallbackIframe) {
                                    fallbackIframe = document.createElement('iframe');
                                    fallbackIframe.style.display = 'none';
                                    fallbackIframe.name = iframeName;
                                    fallbackIframe.id = iframeName;
                                    document.body.appendChild(fallbackIframe);
                                }
                                var previousTarget = form.target;
                                form.target = iframeName;
                                // Native submit includes file inputs
                                form.submit();
                                // restore target and clean up iframe after a short delay
                                setTimeout(function(){
                                    form.target = previousTarget || '';
                                    setTimeout(function(){ try { document.body.removeChild(fallbackIframe); } catch(e) {} }, 2000);
                                }, 1000);
                            } catch (e2) {
                                console.error('Fallback submit failed:', e2);
                            }
                        }
                    }).finally(function(){
                        btn.disabled = false;
                        var spinner = form.querySelector('.btn-spinner'); if (spinner) spinner.classList.remove('spinning');
                        var btnText = form.querySelector('.btn-text'); if (btnText) btnText.textContent = 'Send Message';
                    });
                });
            }
        })();
    </script>

</body>
</html>
