<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Bzgn2rUXqaWJ82DEFu0AEfvRdKrBLrDbl5GQGD70Z0c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.title }}">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "{{ site.title }}",
        "url": "{{ site.url }}{{ site.baseurl }}",
        "image": "{{ '/assets/img/prof_pic.jpg' | absolute_url }}",
        "email": "mailto:{{ site.email }}",
        "sameAs": [
            {% assign first = 0 %}
            {% if site.social.linkedin %}{% if first == 1 %}, {% endif %}"{{ site.social.linkedin }}"{% assign first = 1 %}{% endif %}
            {% if site.social.orcid %}{% if first == 1 %}, {% endif %}"{{ site.social.orcid }}"{% assign first = 1 %}{% endif %}
            {% if site.social.google_scholar %}{% if first == 1 %}, {% endif %}"{{ site.social.google_scholar }}"{% assign first = 1 %}{% endif %}
            {% if site.social.researchgate %}{% if first == 1 %}, {% endif %}"{{ site.social.researchgate }}"{% assign first = 1 %}{% endif %}
            {% if site.social.twitter %}{% if first == 1 %}, {% endif %}"{{ site.social.twitter }}"{% assign first = 1 %}{% endif %}
        ]
    }
    </script>
</head>
<body>
    <div class="site-container">
        <aside class="sidebar">
            <div class="sidebar-sticky">
                <div class="profile-header">
                    <img src="{{ '/assets/img/prof_pic.jpg' | relative_url }}" class="profile-img">
                    <h1>{{ site.title }}</h1>
                    <p class="tagline">{{ site.description }}</p>
                </div>
                
                <nav class="nav-links">
                    {% if site.email %}     
                        <a href="javascript:void(0)" onclick="openContactModal()" title="Contact" aria-label="Contact"><i class="fas fa-envelope"></i> Email Me</a>
                    {% else %}
                        <span class="disabled-link" aria-hidden="true"><i class="fas fa-envelope"></i> Email Me</span>
                    {% endif %}
                    <a href="https://scholar.google.com/citations?user=Af0tawMAAAAJ" target="_blank"><i class="fas fa-graduation-cap"></i> Google Scholar</a>
                    <a href="https://orcid.org/0000-0002-6847-9017" target="_blank"><i class="fab fa-orcid"></i> ORCID Profile</a>
                </nav>

                <div class="sidebar-footer">
                    <p>© {{ "now" | date: "%Y" }} Ismail Baklouti</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            {{ content }}
        </main>
    </div>

    <!-- Contact Modal (The only place the form should exist) -->
    <div id="contactModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
            <button class="close-btn" onclick="closeContactModal()" aria-label="Close contact form">&times;</button>
            <div class="modal-header" id="contactModalHeader" title="Drag to move"> 
                <h2 id="contactModalTitle">Contact Dr. Baklouti</h2>
            </div>
            
            <form id="contactForm" action="https://formspree.io/f/{{ site.formspree_id }}" method="POST" enctype="multipart/form-data">                
                <div style="position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden;" aria-hidden="true">
                    <label>Leave this field empty</label>
                    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="contactEmail">Your Email Address:</label>
                    <input type="email" name="email" id="contactEmail" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="contactMessage">Message:</label>
                    <textarea name="message" id="contactMessage" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="contactAttachment">Attach File (Optional):</label>
                    <input type="file" name="attachment" id="contactAttachment" accept=".pdf,image/*">
                    <div class="file-actions">
                        <div class="file-info" id="contactFileInfo" aria-live="polite"></div>
                        <div class="file-preview" id="contactFilePreview" aria-hidden="true">
                            <img id="contactPreviewImg" alt="Preview" src="" style="display:none">
                            <button type="button" class="remove-file" id="contactRemoveFile" style="display:none">Remove</button>
                        </div>
                    </div>
                </div>

                <div id="contactFormMessage" class="form-message" role="status" aria-live="polite"></div>

                <button type="submit" class="send-btn" id="contactSendBtn">
                    <span class="btn-spinner" aria-hidden="true"></span>
                    <span class="btn-text">Send Message</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        (function(){
            var modal = document.getElementById('contactModal');
            var form = document.getElementById('contactForm');
            var btn = document.getElementById('contactSendBtn');
            var msg = document.getElementById('contactFormMessage');
            var fileInput = document.getElementById('contactAttachment');
            var fileInfo = document.getElementById('contactFileInfo');
            var previouslyFocused = null;

            var ALLOWED_TYPES = ['application/pdf', 'image/png', 'image/jpeg'];
            var MAX_SIZE = 5 * 1024 * 1024; // 5 MB

            window.openContactModal = function() {
                if (!modal) return;
                previouslyFocused = document.activeElement;
                modal.style.display = 'block';
                modal.setAttribute('aria-hidden', 'false');
                trapFocus(modal);
                var email = document.getElementById('contactEmail');
                if (email) email.focus();
            };

            window.closeContactModal = function() {
                if (!modal) return;
                modal.style.display = 'none';
                modal.setAttribute('aria-hidden', 'true');
                releaseFocusTrap();
                if (previouslyFocused && previouslyFocused.focus) previouslyFocused.focus();
            };

            window.addEventListener('click', function(event){ if (event.target === modal) closeContactModal(); });
            window.addEventListener('keydown', function(e){ if (e.key === 'Escape') { if (modal && modal.style.display === 'block') closeContactModal(); }});

            // Modal Drag Logic
            (function(){
                var modalContent = document.querySelector('.modal-content');
                var dragHandle = document.getElementById('contactModalHeader');
                if (!modalContent || !dragHandle) return;
                var isDragging = false, startX = 0, startY = 0, origX = 0, origY = 0;

                function onPointerMove(e) {
                    if (!isDragging) return;
                    var clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
                    var clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY);
                    modalContent.style.left = (origX + (clientX - startX)) + 'px';
                    modalContent.style.top = (origY + (clientY - startY)) + 'px';
                    modalContent.style.transform = 'none';
                }
                function onPointerUp() { 
                    isDragging = false; 
                    document.removeEventListener('mousemove', onPointerMove); 
                    document.removeEventListener('mouseup', onPointerUp);
                }
                dragHandle.addEventListener('mousedown', function(e){
                    if (e.button !== 0) return;
                    isDragging = true;
                    startX = e.clientX; startY = e.clientY;
                    var rect = modalContent.getBoundingClientRect();
                    origX = rect.left; origY = rect.top;
                    document.addEventListener('mousemove', onPointerMove);
                    document.addEventListener('mouseup', onPointerUp);
                });
            })();

            // Focus Trap
            var focusable = null;
            function trapFocus(container){
                focusable = Array.prototype.slice.call(container.querySelectorAll('a, button, textarea, input, [tabindex]:not([tabindex="-1"])')).filter(function(el){ return !el.hasAttribute('disabled'); });
                container.addEventListener('keydown', handleTrap);
            }
            function releaseFocusTrap(){ if(modal) modal.removeEventListener('keydown', handleTrap); }
            function handleTrap(e){ if (e.key !== 'Tab') return; var first = focusable[0], last = focusable[focusable.length -1]; if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); } else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); } }

            // File Validation & Preview
            if (fileInput) {
                fileInput.addEventListener('change', function(){
                    var f = fileInput.files[0];
                    if (f && (ALLOWED_TYPES.indexOf(f.type) === -1 || f.size > MAX_SIZE)) {
                        fileInfo.textContent = 'Invalid file (Max 5MB PDF/JPG/PNG)';
                        fileInfo.style.color = '#991b1b';
                        btn.disabled = true;
                    } else if (f) {
                        fileInfo.textContent = f.name;
                        fileInfo.style.color = '#334155';
                        btn.disabled = false;
                    }
                });
            }

            // AJAX Submit
            if (form) {
                form.addEventListener('submit', function(e){
                    e.preventDefault();
                    btn.disabled = true;
                    form.querySelector('.btn-text').textContent = 'Sending...';
                    fetch(form.action, { method: 'POST', body: new FormData(form), headers: {'Accept': 'application/json'} })
                    .then(response => {
                        if (response.ok) {
                            msg.textContent = 'Message sent!';
                            msg.className = 'form-message success';
                            form.reset();
                            setTimeout(closeContactModal, 2000);
                        } else { throw new Error(); }
                    })
                    .catch(() => {
                        msg.textContent = 'Error sending message.';
                        msg.className = 'form-message error';
                    })
                    .finally(() => {
                        btn.disabled = false;
                        form.querySelector('.btn-text').textContent = 'Send Message';
                    });
                });
            }
        })();
    </script>
</body>
</html>
