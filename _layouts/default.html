<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Bzgn2rUXqaWJ82DEFu0AEfvRdKrBLrDbl5GQGD70Z0c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="site-container">
        <aside class="sidebar">
            <div class="sidebar-sticky">
                <div class="profile-header">
                    <!-- Image will now auto-size to fill this space -->
                    <img src="{{ '/assets/img/prof_pic.jpg' | relative_url }}" class="profile-img">
                    <h1>{{ site.title }}</h1>
                    <p class="tagline">{{ site.description }}</p>
                </div>
                
                <nav class="nav-links">
                    <a href="mailto:{{ site.email }}"><i class="fas fa-envelope"></i> Email Me</a>
                    <a href="https://scholar.google.com/citations?user=Af0tawMAAAAJ" target="_blank"><i class="fas fa-graduation-cap"></i> Google Scholar</a>
                    <a href="https://orcid.org/0000-0002-6847-9017" target="_blank"><i class="fab fa-orcid"></i> ORCID Profile</a>
                </nav>

                <div class="sidebar-footer">
                    <p>© {{ "now" | date: "%Y" }} Ismail Baklouti</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            {{ content }}
        </main>
    </div>
</body>
</html>
